services:
  db:
    image: postgres:17-alpine
    container_name: complif_db
    environment:
      POSTGRES_DB: complif_challenge
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: